<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="tianxuan icon">
  <title>tianxuan</title>
  <defs>
    <linearGradient id="tx-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d97757"/>
      <stop offset="40%" stop-color="#e8a87c"/>
      <stop offset="100%" stop-color="#c45d3a"/>
    </linearGradient>
  </defs>

  <!-- Base: dark rounded rect with warm copper border -->
  <rect width="1024" height="1024" rx="192" fill="#0f1117" stroke="#d97757" stroke-width="3" opacity="0.2"/>

  <!-- Outer subtle ring -->
  <circle cx="512" cy="512" r="420" fill="none" stroke="#d97757" stroke-width="2" opacity="0.08"/>

  <!-- Main diamond -->
  <polygon points="512,200 800,512 512,824 224,512" fill="url(#tx-grad)"/>

  <!-- Inner split (3D depth) -->
  <polygon points="512,240 760,512 512,784 264,512" fill="#0f1117" opacity="0.18"/>
</svg>
