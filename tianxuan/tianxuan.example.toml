# Tianxuan configuration.
# Resolution order: flag > ./tianxuan.toml > ~/.config/tianxuan/config.toml > built-in defaults.
# Secrets come from the environment via api_key_env; never put keys here.

default_model = "deepseek"   # a provider name (→ its default model) or "provider/model"
# language      = "zh"   # ui language; empty = auto-detect from $LANG / $TIANXUAN_LANG

[agent]
system_prompt = """
You are Tianxuan, a coding agent focused on executing code tasks.
Use the provided tools to read and write files and run shell commands.
Principles: understand the request before acting; verify with tools instead of
guessing; keep changes minimal and correct; briefly summarize what you did."""
# system_prompt_file = "prompts/system.md"   # overrides system_prompt when set
max_steps   = 25
temperature = 0.0
auto_plan   = "ask"   # off|ask|on; ask/on auto-enter plan mode for complex tasks
# output_style = "explanatory"   # persona/tone: explanatory | learning | concise,
#                                  or a custom .tianxuan/output-styles/<name>.md ; empty = default

# A provider is a vendor endpoint (one base_url + key) that offers one or more
# models. Use `models = [...]` to expose several under a single entry — switching
# models reuses the same connection.
[[providers]]
name        = "deepseek"
kind        = "openai"
base_url    = "https://api.deepseek.com"
models      = ["deepseek-v4-flash", "deepseek-v4-pro"]
default     = "deepseek-v4-flash"   # optional; defaults to the first of `models`
api_key_env = "DEEPSEEK_API_KEY"
context_window = 1000000
price       = { cache_hit = 0.02, input = 1, output = 2, currency = "¥" }   # per 1M tokens

[tools]
enabled = []   # empty = all built-in tools

# CodeGraph code intelligence (symbol/call-graph search via tree-sitter + SQLite).
# On by default. Disable to fall back to grep/glob.
# [codegraph]
# enabled      = true
# auto_install = true
# path         = ""   # empty = cache, then PATH

# Skills are invokable playbooks (SKILL.md / <name>.md), found under
# .tianxuan/skills (project) and ~/.tianxuan/skills (global).
# [skills]
# paths = ["~/my-skills", "../shared/skills"]   # extra skill roots

# Hooks run shell commands around the loop (PreToolUse / PostToolUse / Stop).
# Configure in ~/.tianxuan/settings.json (global) or .tianxuan/settings.json (project):
#   { "hooks": {
#       "PreToolUse":  [ { "match": "bash", "command": "my-guard.sh" } ],
#       "PostToolUse": [ { "match": ".*file", "command": "gofmt -w ." } ],
#       "Stop":        [ { "command": "notify-send 'turn done'" } ] } }

# A custom status line command (receives JSON on stdin).
# [statusline]
# command = "my-statusline.sh"

# External stdio plugins (MCP-compatible); each is a standalone executable.
# [[plugins]]
# name    = "example"
# command = "tianxuan-plugin-example"
