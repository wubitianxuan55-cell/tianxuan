<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="tianxuan icon">
  <title>tianxuan</title>
  <defs>
    <linearGradient id="tx-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d97757"/>
      <stop offset="40%" stop-color="#e8a87c"/>
      <stop offset="100%" stop-color="#c45d3a"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Circular dark background -->
  <circle cx="512" cy="512" r="512" fill="#0f1117"/>

  <!-- Subtle ring -->
  <circle cx="512" cy="512" r="460" fill="none" stroke="#d97757" stroke-width="1.5" opacity="0.12"/>

  <g transform="translate(512, 512)" filter="url(#glow)">
    <!-- Outer diamond -->
    <polygon points="0,-260 170,0 0,260 -170,0" fill="none" stroke="url(#tx-grad)" stroke-width="2.5" opacity="0.45"/>

    <!-- Inner filled diamond -->
    <polygon points="0,-150 115,0 0,150 -115,0" fill="url(#tx-grad)" opacity="0.88"/>

    <!-- Center bar -->
    <rect x="-115" y="-26" width="230" height="7" rx="3.5" fill="#0f1117" opacity="0.65"/>

    <!-- Vertical line -->
    <line x1="0" y1="-112" x2="0" y2="112" stroke="#0f1117" stroke-width="5" opacity="0.3"/>

    <!-- Top marker -->
    <circle cx="0" cy="-185" r="7" fill="url(#tx-grad)"/>
    <rect x="-2" y="-178" width="4" height="15" rx="2" fill="url(#tx-grad)" opacity="0.35"/>

    <!-- Bottom marker -->
    <circle cx="0" cy="185" r="5" fill="url(#tx-grad)" opacity="0.55"/>
  </g>
</svg>
