  </g>

  <!-- Wordmark: "tianxuan" -->
  <text x="165" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" letter-spacing="-0.5" fill="url(#tx-grad)">tianxuan</text>

  <!-- Tagline -->
  <text x="167" y="128" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="400" fill="#c0c4cc" opacity="0.7">DeepSeek-native coding agent</text>
