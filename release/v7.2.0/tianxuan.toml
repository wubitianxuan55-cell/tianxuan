# tianxuan configuration
# Secrets come from .env via api_key_env; never put keys here.

default_model = "deepseek-pro"

[agent]
max_steps   = 25
temperature = 0.0

[[providers]]
name        = "deepseek"
kind        = "openai"
base_url    = "https://api.deepseek.com"
models      = ["deepseek-v4-flash"]
api_key_env = "DEEPSEEK_API_KEY"

[[providers]]
name        = "deepseek-pro"
kind        = "openai"
base_url    = "https://api.deepseek.com"
models      = ["deepseek-v4-pro"]
api_key_env = "DEEPSEEK_API_KEY"
