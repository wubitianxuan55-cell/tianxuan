<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="tianxuan icon">
  <title>tianxuan</title>
  <defs>
    <!-- 全息炫彩渐变 — 神经节点连线 -->
    <linearGradient id="holo-line" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="25%" stop-color="#6ee7ff"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="75%" stop-color="#ff2d95"/>
      <stop offset="100%" stop-color="#4f8cf7"/>
    </linearGradient>

    <!-- 节点填充渐变 -->
    <radialGradient id="holo-node" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="30%" stop-color="#6ee7ff" stop-opacity="0.9"/>
      <stop offset="70%" stop-color="#a855f7" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#4f8cf7" stop-opacity="0.3"/>
    </radialGradient>

    <!-- 中心核心节点渐变 — 更亮 -->
    <radialGradient id="holo-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="15%" stop-color="#e0f7ff" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#6ee7ff" stop-opacity="0.85"/>
      <stop offset="75%" stop-color="#a855f7" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#4f8cf7" stop-opacity="0.15"/>
    </radialGradient>

    <!-- 中心辉光滤镜 -->
    <filter id="core-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="28" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- 节点辉光滤镜 -->
    <filter id="node-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- 外环辉光 -->
    <filter id="ring-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- 六边形网格图案 -->
    <pattern id="hex-grid" x="0" y="0" width="64" height="111" patternUnits="userSpaceOnUse">
      <path d="M32 0 L64 18.5 L64 55.5 L32 74 L0 55.5 L0 18.5 Z" fill="none" stroke="rgba(110,231,255,0.04)" stroke-width="1"/>
      <path d="M32 111 L64 92.5 L64 55.5 L32 74 L0 55.5 L0 92.5 Z" fill="none" stroke="rgba(110,231,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- 深空背景 -->
  <rect width="1024" height="1024" fill="#060b14"/>

  <!-- 六边形暗网 -->
  <rect width="1024" height="1024" fill="url(#hex-grid)"/>

  <!-- 外虚线光环 (科幻旋转环) -->
  <circle cx="512" cy="512" r="410" fill="none" stroke="url(#holo-line)" stroke-width="1.5" stroke-dasharray="28 18 4 18 28 120" opacity="0.18" filter="url(#ring-glow)"/>

  <!-- 外环 2 — 更大更淡 -->
  <circle cx="512" cy="512" r="440" fill="none" stroke="url(#holo-line)" stroke-width="0.8" stroke-dasharray="4 32" opacity="0.08"/>

  <!-- ====== 6条辐射连线 ====== -->
  <!-- 中心到上 -->
  <line x1="512" y1="512" x2="512" y2="176" stroke="url(#holo-line)" stroke-width="3.5" opacity="0.45"/>
  <!-- 中心到右上 -->
  <line x1="512" y1="512" x2="803" y2="344" stroke="url(#holo-line)" stroke-width="3.5" opacity="0.45"/>
  <!-- 中心到右下 -->
  <line x1="512" y1="512" x2="803" y2="680" stroke="url(#holo-line)" stroke-width="3.5" opacity="0.45"/>
  <!-- 中心到下 -->
  <line x1="512" y1="512" x2="512" y2="848" stroke="url(#holo-line)" stroke-width="3.5" opacity="0.45"/>
  <!-- 中心到左下 -->
  <line x1="512" y1="512" x2="221" y2="680" stroke="url(#holo-line)" stroke-width="3.5" opacity="0.45"/>
  <!-- 中心到左上 -->
  <line x1="512" y1="512" x2="221" y2="344" stroke="url(#holo-line)" stroke-width="3.5" opacity="0.45"/>

  <!-- 外围连线 (六边形环) -->
  <line x1="512" y1="176" x2="803" y2="344" stroke="url(#holo-line)" stroke-width="1.8" opacity="0.22"/>
  <line x1="803" y1="344" x2="803" y2="680" stroke="url(#holo-line)" stroke-width="1.8" opacity="0.22"/>
  <line x1="803" y1="680" x2="512" y2="848" stroke="url(#holo-line)" stroke-width="1.8" opacity="0.22"/>
  <line x1="512" y1="848" x2="221" y2="680" stroke="url(#holo-line)" stroke-width="1.8" opacity="0.22"/>
  <line x1="221" y1="680" x2="221" y2="344" stroke="url(#holo-line)" stroke-width="1.8" opacity="0.22"/>
  <line x1="221" y1="344" x2="512" y2="176" stroke="url(#holo-line)" stroke-width="1.8" opacity="0.22"/>

  <!-- ====== 6个外围节点 ====== -->
  <!-- 上 -->
  <circle cx="512" cy="176" r="32" fill="url(#holo-node)" filter="url(#node-glow)" opacity="0.9"/>
  <circle cx="512" cy="176" r="10" fill="#ffffff" opacity="0.7"/>

  <!-- 右上 -->
  <circle cx="803" cy="344" r="32" fill="url(#holo-node)" filter="url(#node-glow)" opacity="0.9"/>
  <circle cx="803" cy="344" r="10" fill="#ffffff" opacity="0.7"/>

  <!-- 右下 -->
  <circle cx="803" cy="680" r="32" fill="url(#holo-node)" filter="url(#node-glow)" opacity="0.9"/>
  <circle cx="803" cy="680" r="10" fill="#ffffff" opacity="0.7"/>

  <!-- 下 -->
  <circle cx="512" cy="848" r="32" fill="url(#holo-node)" filter="url(#node-glow)" opacity="0.9"/>
  <circle cx="512" cy="848" r="10" fill="#ffffff" opacity="0.7"/>

  <!-- 左下 -->
  <circle cx="221" cy="680" r="32" fill="url(#holo-node)" filter="url(#node-glow)" opacity="0.9"/>
  <circle cx="221" cy="680" r="10" fill="#ffffff" opacity="0.7"/>

  <!-- 左上 -->
  <circle cx="221" cy="344" r="32" fill="url(#holo-node)" filter="url(#node-glow)" opacity="0.9"/>
  <circle cx="221" cy="344" r="10" fill="#ffffff" opacity="0.7"/>

  <!-- ====== 中心核心节点 ====== -->
  <!-- 外层大辉光 -->
  <circle cx="512" cy="512" r="64" fill="url(#holo-core)" filter="url(#core-glow)"/>
  <!-- 中层 -->
  <circle cx="512" cy="512" r="42" fill="url(#holo-node)"/>
  <!-- 内核高光 -->
  <circle cx="512" cy="512" r="16" fill="#ffffff" opacity="0.95"/>
  <!-- 核中心亮点 -->
  <circle cx="512" cy="512" r="5" fill="#ffffff"/>
</svg>
